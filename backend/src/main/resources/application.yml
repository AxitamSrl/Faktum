spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  application:
    name: faktum-backend

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTHENTIK_ISSUER_URI:https://sso.axitam.net/application/o/faktum/}

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
    properties:
      hibernate:
        globally_quoted_identifiers: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

meilisearch:
  url: http://localhost:7700
  api-key: ${MEILISEARCH_API_KEY:}
